<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3.js Network Graph with Zoom and Pan</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .link {
            stroke: #999;
            stroke-opacity: 0.6;
        }

        .node {
            stroke: #fff;
            stroke-width: 1.5px;
        }
    </style>
</head>
<body>
<svg width="800" height="600"></svg>

<script>
    const svg = d3.select("svg"),
        width = +svg.attr("width"),
        height = +svg.attr("height");

    const nodes = [
        {id: "1", name: "Node 1"},
        {id: "2", name: "Node 2"},
        {id: "3", name: "Node 3"},
        {id: "4", name: "Node 4"}
    ];

    const links = [
        {source: "1", target: "2"},
        {source: "2", target: "3"},
        {source: "3", target: "4"},
        {source: "4", target: "1"}
    ];

    const zoom = d3.zoom()
        .scaleExtent([0.1, 10])
        .on("zoom", (event) => {
            if (event.sourceEvent && event.sourceEvent.altKey) {
                console.log('Alt key pressed - Pan disabled');
                event.sourceEvent.stopImmediatePropagation();
            } else {
                g.attr("transform", event.transform);
            }
        });

    svg.call(zoom);

    const g = svg.append("g");

    const link = g.selectAll(".link")
        .data(links)
        .enter().append("line")
        .attr("class", "link")
        .attr("stroke-width", 2)
        .attr("x1", d => nodes.find(n => n.id === d.source).x)
        .attr("y1", d => nodes.find(n => n.id === d.source).y)
        .attr("x2", d => nodes.find(n => n.id === d.target).x)
        .attr("y2", d => nodes.find(n => n.id === d.target).y);

    const node = g.selectAll(".node")
        .data(nodes)
        .enter().append("circle")
        .attr("class", "node")
        .attr("r", 5)
        .attr("cx", d => d.x = Math.random() * width)
        .attr("cy", d => d.y = Math.random() * height)
        .call(drag());

    function drag() {
        return d3.drag()
            .on("start", (event, d) => {
                d3.select(this).raise().attr("stroke", "black");
            })
            .on("drag", (event, d) => {
                if (event.sourceEvent && event.sourceEvent.altKey) {
                    console.log(`Dragging node ${d.id} with Alt key pressed`);
                } else {
                    d.x = event.x;
                    d.y = event.y;
                    d3.select(this).attr("cx", d.x).attr("cy", d.y);
                    link
                        .filter(l => l.source === d.id || l.target === d.id)
                        .attr("x1", l => nodes.find(n => n.id === l.source).x)
                        .attr("y1", l => nodes.find(n => n.id === l.source).y)
                        .attr("x2", l => nodes.find(n => n.id === l.target).x)
                        .attr("y2", l => nodes.find(n => n.id === l.target).y);
                }
            })
            .on("end", (event, d) => {
                d3.select(this).attr("stroke", null);
            });
    }
</script>
</body>
</html>

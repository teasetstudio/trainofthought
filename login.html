<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train of Thought — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1 class="auth-title">Train of Thought</h1>
    <p class="auth-subtitle" id="mode-label">Sign in to continue.</p>

    <form id="auth-form" class="auth-form">
      <div id="display-name-field" class="auth-field hidden">
        <label for="display-name">Display name</label>
        <input id="display-name" name="displayName" type="text" maxlength="80" autocomplete="name" />
      </div>

      <div class="auth-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" />
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="8" autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button id="submit-button" class="auth-button" type="submit">Sign in</button>
        <button id="mode-toggle" class="auth-link-button" type="button">Create account</button>
        <a class="auth-link" href="/">Home</a>
      </div>
    </form>

    <p id="auth-status" class="auth-status" role="status" aria-live="polite"></p>
  </main>

  <script type="module" src="/login.js"></script>
</body>
</html>

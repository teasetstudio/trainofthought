<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Train of Thought — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth.css">
  <link rel="stylesheet" href="/pages/iframe.css">
</head>
<body class="auth-page iframe-page">
  <main class="auth-card">
    <h1 class="auth-title">Profile</h1>
    <p class="auth-subtitle">Manage your account details.</p>

    <form id="profile-form" class="auth-form">
      <div class="auth-field">
        <label for="profile-email">Email</label>
        <input id="profile-email" type="email" readonly />
      </div>

      <div class="auth-field">
        <label for="profile-display-name">Display name</label>
        <input id="profile-display-name" type="text" maxlength="80" required />
      </div>

      <div class="auth-actions">
        <button class="auth-button" type="submit">Save</button>
        <a class="auth-link" href="/rooms">Back to studios</a>
        <button id="logout-button" class="auth-link-button" type="button">Logout</button>
      </div>
    </form>

    <p id="profile-status" class="auth-status" role="status" aria-live="polite"></p>
  </main>

  <script type="module" src="/frontend/host/childPage.js"></script>
  <script type="module" src="/profile.js"></script>
</body>
</html>
